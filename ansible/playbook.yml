---
- name: Bootstrap Rails Production Server (Docker Edition)
  hosts: web_servers
  become: yes

  tasks:
    - name: Create 2GB Swap File
      shell: |
        fallocate -l 2G /swapfile
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
        echo '/swapfile none swap sw 0 0' | tee -a /etc/fstab
      args:
        creates: /swapfile

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker and AWS CLI dependencies
      apt:
        name:
          - docker.io
          - unzip
          - curl
        state: present

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add 'ubuntu' user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Check if AWS CLI is installed
      command: aws --version
      register: aws_cli_check
      ignore_errors: yes

    - name: Install AWS CLI v2
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -o awscliv2.zip
        sudo ./aws/install --update
        rm -rf awscliv2.zip aws/
      when: aws_cli_check.rc != 0

    - name: Remove old Ruby/RVM traces (Optional cleanup)
      file:
        path: /home/ubuntu/.rvm
        state: absent

    - name: Remove old application directory (Optional cleanup)
      file:
        path: /home/ubuntu/hello-world-infra-lab
        state: absent

    - name: Remove old Systemd service
      file:
        path: /etc/systemd/system/hello-world.service
        state: absent
      notify: Reload Systemd

    - name: Stop and disable Nginx (Docker will handle Port 80)
      service:
        name: nginx
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove default Nginx index page
      file:
        path: /var/www/html/index.html
        state: absent

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes
