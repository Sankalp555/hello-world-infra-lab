# push / pull request
#         ↓
# GitHub starts Ubuntu runner
#         ↓
# PostgreSQL service starts
#         ↓
# Ruby is installed
#         ↓
# Gems are installed from Gemfile.lock
#         ↓
# Test database is prepared
#         ↓
# RSpec runs
#         ↓
# RuboCop runs
#         ↓
# Brakeman runs

#===================================

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test, lint, and scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hello_world_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Ansible & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          pipx inject ansible-core boto3 botocore

      - name: Wait for instances to be ready
        run: sleep 30

      - name: Debug Inventory
        run: |
          ansible-inventory -i ansible/inventory_aws_ec2.yml --list

      - name: Run Orchestrated Deployment
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          # Use --limit to ensure we fail if no hosts are found
          ansible web_servers -i ansible/inventory_aws_ec2.yml \
          -u ${{ secrets.EC2_USER }} \
          -m shell -a "cd ~/hello-world-infra-lab && ./script/deploy.sh" \
          --private-key ~/.ssh/id_rsa


# ===============================================

# Create a fresh temporary machine
#         ↓
# Download your code
#         ↓
# Install the correct Ruby version
#         ↓
# Install app dependencies from Gemfile.lock
#         ↓
# Start required external services, here PostgreSQL
#         ↓
# Prepare the test database
#         ↓
# Run automated checks

# HTTP       → 80
# HTTPS      → 443
# SSH        → 22
# PostgreSQL → 5432
# Redis      → 6379
# MySQL      → 3306


#=========================================================


# GitHub Actions CI Flow

# Push / Pull Request
# ↓
# GitHub detects event
# ↓
# GitHub creates Ubuntu Runner (temporary VM)
# ↓
# GitHub starts Service Containers
# (PostgreSQL, Redis, etc.)
# ↓
# GitHub waits until services are healthy
# (pg_isready, health checks)
# ↓
# ─────────────────────────────────────
# Sequential CI Steps Begin
# ─────────────────────────────────────
# ↓
# Checkout Code
# (actions/checkout@v4)
# ↓
# Setup Ruby Environment
# (ruby/setup-ruby)
# ↓
# Install Gems
# (bundle install)
# ↓
# Prepare Test Database
# (rails db:prepare)
# ↓
# Run RSpec Tests
# (bundle exec rspec)
# ↓
# Run RuboCop
# (bundle exec rubocop)
# ↓
# Run Brakeman
# (bundle exec brakeman)
# ↓
# Workflow Succeeds ✅
# (or stops immediately on first failure ❌)

# Meanwhile, PostgreSQL Service is running continuously:


# ```
#            Runner VM
#            ----------
# ```

# Checkout
# Setup Ruby
# Bundle Install
# DB Prepare
# RSpec
# Rubocop
# Brakeman

# ```
#       ↕ Network (port 5432)

#     PostgreSQL Container
#          (Running)
# ```

# Steps = Sequential

# Services = Concurrent

# Jobs = Can Run In Parallel
