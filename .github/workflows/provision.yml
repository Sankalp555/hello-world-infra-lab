name: Provision Infrastructure

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    paths:
      - 'terraform-lab/**'
      - 'ansible/**'
    branches:
      - main

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform-lab

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform-lab

  ansible:
    name: Ansible Configure
    runs-on: ubuntu-latest
    needs: terraform
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pipx
          pipx inject ansible-core boto3 botocore

      - name: Wait for instances to be running
        run: sleep 60

      - name: Debug Inventory
        run: |
          ansible-inventory -i ansible/inventory_aws_ec2.yml --list

      - name: Run Playbook
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i ansible/inventory_aws_ec2.yml ansible/playbook.yml \
          --private-key ~/.ssh/id_rsa
